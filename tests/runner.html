<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Test Report - House of Smith POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sembunyikan toast dari app.js saat testing biar layar ga penuh */
        .toast { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-md border border-gray-200">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Automated Unit Testing Report</h1>
        <p class="text-gray-500 mb-6">Modul: Auth, Product Management, Inventory, & POS</p>
        
        <button onclick="runAllTests()" class="mb-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors">
            ▶ Jalankan Ulang Semua Test
        </button>

        <div id="test-output" class="flex flex-col gap-2"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="../src/app.js"></script>
    <script src="stok.test.js"></script>
</body>
</html>
